<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Run status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>pre { white-space: pre-wrap; word-break: break-word; }</style>
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <h2>Run: {{ run_id }}</h2>

      <p>
        {% if running %}
          <span class="badge bg-warning text-dark">Running</span>
        {% else %}
          <span class="badge bg-success">Finished</span>
        {% endif %}
        {% if exit_code is not none %}
          <strong class="ms-2">Exit code: {{ exit_code }}</strong>
        {% endif %}
      </p>

      <div class="mb-3">
        <a class="btn btn-secondary" href="/">← Home</a>
        <a class="btn btn-outline-primary" href="/download/{{ run_id }}">Download output ZIP</a>
        <a class="btn btn-outline-secondary" href="/status/{{ run_id }}">Refresh</a>
      </div>

      <h5>Logs</h5>
      <div class="card">
        <div class="card-body bg-dark text-light" style="max-height:60vh; overflow:auto; font-family: monospace; font-size:0.9rem;">
          <pre>{{ logs }}</pre>
        </div>
      </div>
    </div>
  </body>
</html>
